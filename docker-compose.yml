version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wtf
      POSTGRES_USER: wtf
      POSTGRES_PASSWORD: wtf
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wtf -d wtf"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://wtf:wtf@db:5432/wtf?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      UPLOADS_DIR: /uploads
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
