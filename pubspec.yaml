name: wtf_yandex_sirius
description: "What They Feel — anonymous social platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.3.0

  # HTTP
  dio: ^5.7.0

  # DI
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Local Storage
  shared_preferences: ^2.3.3

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  

  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2

  cupertino_icons: ^1.0.8
  share_plus: ^12.0.2
  flutter_secure_storage: ^10.0.0
  sqflite: ^2.4.2
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.7
  mockito: ^5.4.4
  build_runner: ^2.4.13
  injectable_generator: ^2.7.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
